# GestHeures — stack complète (PostgreSQL + API + interface web)
#
# Démarrage : docker compose up --build
# Interface : http://localhost:8080  (l’API est proxifiée en /api)
#
# Variables sensibles à adapter en production (JWT_SECRET, mots de passe).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gestheures
      POSTGRES_PASSWORD: gestheures
      POSTGRES_DB: gestheures
    volumes:
      - gestheures_pgdata:/var/lib/postgresql/data
      - ./backend/src/data/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gestheures -d gestheures"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: "5000"
      DB_HOST: db
      DB_USER: gestheures
      DB_PASSWORD: gestheures
      DB_NAME: gestheures
      DB_PORTDB: "5432"
      JWT_SECRET: ${JWT_SECRET:-changez-moi-en-production-minimum-32-caracteres}
      FRONTEND_URL: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  gestheures_pgdata:
