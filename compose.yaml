# GestHeures — Orchestration complète (PostgreSQL + Backend API + Frontend Nginx)
# Usage : docker compose up --build

services:
  # Base de données PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: gestheures-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-gestheures}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gestheures}
      POSTGRES_DB: ${DB_NAME:-gestheures}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/data/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/data/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gestheures} -d ${DB_NAME:-gestheures}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # API Backend Node.js
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gestheures-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_USER: ${DB_USER:-gestheures}
      DB_PASSWORD: ${DB_PASSWORD:-gestheures}
      DB_NAME: ${DB_NAME:-gestheures}
      DB_PORTDB: 5432
      JWT_SECRET: ${JWT_SECRET:-votre-secret-tres-long-et-securise-pour-la-prod}
      FRONTEND_URL: http://localhost:8080
    depends_on:
      db:
        condition: service_healthy

  # Frontend React (servi via Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: gestheures-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  pgdata:
